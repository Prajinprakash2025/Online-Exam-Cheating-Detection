{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Create Teacher</h4>
            <a href="{% url 'examiner_dashboard' %}" class="btn btn-outline-secondary rounded-pill btn-sm">Back</a>
        </div>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold mt-2">Create Teacher</button>
                </form>
            </div>
        </div>
    </div>
</div>
<style>
    .form-control, input, select {
        width: 100%;
        padding: 0.5rem 1rem;
        border: 1px solid #dee2e6;
        border-radius: 50rem;
    }
</style>
{% endblock %}
