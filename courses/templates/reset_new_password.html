{% extends 'base.html' %}
{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="card shadow rounded-4 p-5" style="width: 100%; max-width: 500px;">
        <h3 class="fw-bold text-center mb-4">New Password</h3>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>New Password</label>
                <input type="password" name="password" class="form-control rounded-pill px-3" required>
            </div>
            <div class="mb-3">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control rounded-pill px-3" required>
            </div>
            <button class="btn btn-success w-100 rounded-pill py-2">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
