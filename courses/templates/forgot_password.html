{% extends 'base.html' %}
{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="card shadow rounded-4 p-5" style="width: 100%; max-width: 500px;">
        <h3 class="fw-bold text-center mb-4">Reset Password</h3>
        <p class="text-muted text-center mb-4">Enter your email to receive a verification code.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="email" name="email" class="form-control rounded-pill px-3 py-2" placeholder="Ex: john@gmail.com" required>
            </div>
            <button class="btn btn-custom w-100 rounded-pill py-2 text-white" style="background-color: #8e44ad;">Send OTP</button>
        </form>
    </div>
</div>
{% endblock %}
