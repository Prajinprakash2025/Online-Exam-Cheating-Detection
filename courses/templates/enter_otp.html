{% extends 'base.html' %}

{% block content %}
<div class="container py-5 d-flex justify-content-center" style="min-height: 80vh; align-items: center;">
    <div class="card shadow border-0 rounded-4 p-5" style="width: 100%; max-width: 450px;">
        
        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="fa-solid fa-key fs-3"></i>
            </div>
            <h3 class="fw-bold">Security Check</h3>
            <p class="text-muted small">We sent a 4-digit code to {{ request.session.reset_email }}</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} text-center mb-3 py-2 small">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="fw-bold small text-uppercase text-muted mb-2 d-block text-center">Enter 4-Digit Code</label>
                <input type="number" name="otp" 
                       class="form-control form-control-lg rounded-pill text-center fw-bold fs-1" 
                       placeholder="0000" 
                       max="9999"
                       style="letter-spacing: 10px; max-width: 200px; margin: 0 auto;" 
                       required autofocus>
            </div>
            
            <button class="btn btn-custom w-100 rounded-pill py-3 fw-bold shadow-sm" style="background-color: #8e44ad; color: white;">
                Verify Code
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="{% url 'forgot_password' %}" class="text-decoration-none small text-muted">
                Didn't receive code? <span class="text-primary">Resend</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
