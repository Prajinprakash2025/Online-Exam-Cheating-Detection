{% extends 'base.html' %}

{% block content %}
<style>
    /* CSS Variables for this page */
    :root {
        --primary-purple: #8e44ad;
        --primary-dark: #2c3e50;
        --btn-hover: #732d91;
        --bg-cream: #f3f4f6;
    }
    
    /* Focused Input Styling */
    .form-control:focus {
        background-color: white;
        border-color: var(--primary-purple);
        box-shadow: 0 0 0 4px rgba(142, 68, 173, 0.1);
        outline: none;
    }

    .btn-custom {
        background-color: var(--primary-purple);
        color: white;
        transition: all 0.3s;
    }

    .btn-custom:hover {
        background-color: var(--btn-hover);
        color: white;
        transform: translateY(-2px);
    }
</style>

<div class="d-flex align-items-center justify-content-center py-5" style="background-color: var(--bg-cream); min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-lg rounded-5 p-4 text-center overflow-hidden">
                    
                    <div class="card-body p-4">
                        <div class="mb-4 mx-auto bg-light rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 80px; height: 80px;">
                            <i class="fa-solid fa-shield-halved fs-1" style="color: var(--primary-purple);"></i>
                        </div>
                        
                        <h3 class="fw-bold mb-2" style="color: var(--primary-dark);">Verification</h3>
                        <p class="text-muted small mb-4">
                            We've sent a 6-digit code to <br>
                            <span class="fw-bold text-dark">{{ email }}</span>
                        </p>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} py-2 small rounded-pill shadow-sm mb-4">
                                    {% if message.tags == 'error' %}<i class="fa-solid fa-circle-exclamation me-1"></i>{% endif %}
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label class="small fw-bold text-muted mb-2 text-uppercase ls-1">Enter Code</label>
                                <input type="text" name="otp" 
                                       class="form-control form-control-lg text-center fw-bold rounded-pill border" 
                                       placeholder="000000" 
                                       maxlength="6" 
                                       required 
                                       autocomplete="off"
                                       style="letter-spacing: 8px; font-size: 1.8rem; color: var(--primary-dark);">
                            </div>
                            
                            <button type="submit" class="btn btn-custom w-100 rounded-pill py-3 fw-bold shadow-sm">
                                Verify Account
                            </button>
                        </form>

                        <div class="mt-4 pt-3 border-top">
                            <small class="text-muted">Didn't receive code? 
                                <a href="{% url 'signup' %}" class="fw-bold text-decoration-none" style="color: var(--primary-purple);">Resend</a>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
