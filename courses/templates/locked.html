{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-lg rounded-4 text-center p-5">
                <div class="mb-3">
                    <span class="badge bg-warning text-dark rounded-pill px-3 py-2">Locked</span>
                </div>
                <h3 class="fw-bold mb-2">Lesson Locked</h3>
                <p class="text-muted mb-4">
                    This lesson is locked until you complete and receive approval for the previous exam.
                    Please finish the pending lesson or wait for your instructor to approve your attempt.
                </p>
                <div class="d-grid gap-2">
                    <a href="{% url 'profile' %}" class="btn btn-dark rounded-pill fw-bold py-2">
                        Back to Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
